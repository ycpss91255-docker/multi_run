coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
    patch:
      default:
        target: 100%
        threshold: 0%
        if_ci_failed: error

ignore:
  - "test/**/*"
  - "script/ci.sh"
  - "template/**/*"
  - ".github/**/*"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes
